name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Generate icons
        run: |
          mkdir -p /tmp/app
          node -e '
          const f=require("fs"),z=require("zlib");
          function p(s){let d=Buffer.alloc(s*(s*4+1));for(let y=0;y<s;y++){d[y*(s*4+1)]=0;for(let x=0;x<s;x++){let o=y*(s*4+1)+1+x*4;d[o]=27;d[o+1]=58;d[o+2]=45;d[o+3]=255;}}let df=z.deflateSync(d);let sg=Buffer.from([137,80,78,71,13,10,26,10]);function ch(t,dt){let l=Buffer.alloc(4);l.writeUInt32BE(dt.length);let tb=Buffer.from(t);let cr=0xFFFFFFFF;let b=Buffer.concat([tb,dt]);for(let i=0;i<b.length;i++){cr^=b[i];for(let j=0;j<8;j++)cr=(cr>>>1)^(cr&1?0xEDB88320:0);}cr=(cr^0xFFFFFFFF)>>>0;let cb=Buffer.alloc(4);cb.writeUInt32BE(cr);return Buffer.concat([l,tb,dt,cb]);}let ih=Buffer.alloc(13);ih.writeUInt32BE(s,0);ih.writeUInt32BE(s,4);ih[8]=8;ih[9]=6;return Buffer.concat([sg,ch("IHDR",ih),ch("IDAT",df),ch("IEND",Buffer.alloc(0))]);}
          f.writeFileSync("/tmp/app/icon-512.png",p(512));
          f.writeFileSync("/tmp/app/icon-192.png",p(192));
          '
      - name: Build APK
        run: |
          cd /tmp/app
          cat > manifest.json <<'M'
          {"name":"食术养生","short_name":"食术","start_url":"/","display":"standalone","theme_color":"#1B3A2D","background_color":"#1B3A2D","icons":[{"src":"/icon-512.png","sizes":"512x512","type":"image/png"},{"src":"/icon-192.png","sizes":"192x192","type":"image/png"}]}
M
          python3 -m http.server 9999 >/dev/null 2>&1 &
          sleep 1
          echo n | npx -y @bubblewrap/cli init --manifest=http://localhost:9999/manifest.json --directory=/tmp/app/build 2>&1 || true
          echo n | npx -y @bubblewrap/cli init --manifest=http://localhost:9999/manifest.json --directory=/tmp/app/build 2>&1 || true
          ls -la /tmp/app/build/ 2>/dev/null
          find /tmp/app -name "gradlew" 2>/dev/null
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: /tmp/app/**
