name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      
      - name: Generate PNG icons
        run: |
          mkdir -p /tmp/pwa-apk
          node -e '
          const fs=require("fs"),z=require("zlib");
          function png(s){
            let d=Buffer.alloc(s*(s*4+1));
            for(let y=0;y<s;y++){d[y*(s*4+1)]=0;for(let x=0;x<s;x++){let o=y*(s*4+1)+1+x*4;d[o]=27;d[o+1]=58;d[o+2]=45;d[o+3]=255;}}
            let df=z.deflateSync(d);
            let sg=Buffer.from([137,80,78,71,13,10,26,10]);
            function ch(t,dt){let l=Buffer.alloc(4);l.writeUInt32BE(dt.length);let tb=Buffer.from(t,"ascii");let cr=0xFFFFFFFF;let b=Buffer.concat([tb,dt]);for(let i=0;i<b.length;i++){cr^=b[i];for(let j=0;j<8;j++)cr=(cr>>>1)^(cr&1?0xEDB88320:0);}cr=(cr^0xFFFFFFFF)>>>0;let cb=Buffer.alloc(4);cb.writeUInt32BE(cr);return Buffer.concat([l,tb,dt,cb]);}
            let ih=Buffer.alloc(13);ih.writeUInt32BE(s,0);ih.writeUInt32BE(s,4);ih[8]=8;ih[9]=6;
            return Buffer.concat([sg,ch("IHDR",ih),ch("IDAT",df),ch("IEND",Buffer.alloc(0))]);
          }
          fs.writeFileSync("/tmp/pwa-apk/icon-512.png",png(512));
          fs.writeFileSync("/tmp/pwa-apk/icon-192.png",png(192));
          console.log("Icons created");
          '
      
      - name: Create twa-manifest.json
        run: |
          cat > /tmp/pwa-apk/twa-manifest.json << 'EOF'
          {
            "packageId": "com.shishu.wellness",
            "host": "shishu.xn--fiqs8s",
            "name": "食术·中医体质养生",
            "launcherName": "食术养生",
            "display": "standalone",
            "themeColor": "#1B3A2D",
            "themeColorDark": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#1B3A2D",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "/tmp/pwa-apk/icon-512.png",
            "maskableIconUrl": "/tmp/pwa-apk/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "/tmp/pwa-apk/android.keystore",
              "alias": "shishu",
              "password": "shishu2026",
              "keyPassword": "shishu2026"
            },
            "appVersionCode": ${{ github.run_number }},
            "appVersionName": "${{ github.event.inputs.version_name || '1.0' }}",
            "orientation": "portrait",
            "fallbackType": "customtabs"
          }
          EOF
          echo "twa-manifest.json created"
      
      - name: Generate Android Project
        run: |
          cd /tmp/pwa-apk
          # Use bubblewrap to generate project from manifest
          npx @bubblewrap/cli update --skipPwaValidation 2>&1 || true
      
      - name: Build APK
        run: |
          GRADLE_DIR=$(find /tmp/pwa-apk -name "build.gradle" -path "*/app/*" | head -1 | xargs dirname 2>/dev/null)
          if [ -n "$GRADLE_DIR" ] && [ -f "$GRADLE_DIR/../gradlew" ]; then
            cd "$GRADLE_DIR/.."
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1
          else
            # Check for other gradle files
            find /tmp/pwa-apk -name "build.gradle" -o -name "gradlew" 2>/dev/null
            echo "No gradle project found, checking directories..."
            ls -la /tmp/pwa-apk/
            ls -la /tmp/pwa-apk/app/ 2>/dev/null || echo "No app dir"
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wellness-app-release
          path: /tmp/pwa-apk/**/*.apk
          if-no-files-found: warn
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: wellness-app-aab
          path: /tmp/pwa-apk/**/*.aab
          if-no-files-found: warn
